# EXP-002: Demote CCF from hard filter to soft reranker feature
# Hypothesis: CCF hard filter (AUC 0.556) costs recall for minimal
# discriminative value. Keep CCF signal in composite but remove hard cutoff.

high_tmb:
  hard_filters:
    mhc_binding_rank: 0.02
    min_tpm: 1.0
    min_ccf: 0.0            # disabled (was 0.3)
    not_self_match: true
  bonuses:
    is_frameshift: 0.5
    is_shared_neoantigen: 0.3
    is_cd4_epitope: 0.1
