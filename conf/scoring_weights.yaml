# Module 9 configuration: Sequential filter thresholds + rank bonuses
#
# Architecture: sequential hard filters → rank by binding → bonus adjustments
# No weighted composite — each filter is pass/fail, ranking is by binding strength
#
# Note: Structural scoring (Tier 1 position lookup) was demoted from default
# path after EXP-040 ablation showed AUC 0.489 (below chance) and removing it
# improved Recall@20 by +0.003. Only enabled in 'research' profile.
# AlphaFold2 Tier 3 investment deferred — no evidence of lift.

high_tmb:
  # Melanoma, NSCLC — abundant neoantigens, standard thresholds
  hard_filters:
    mhc_binding_rank: 0.02    # presentation percentile < 2%
    min_tpm: 1.0              # gene must be expressed
    min_ccf: 0.3              # prefer clonal but don't require it
    not_self_match: true      # exclude self-similar peptides
  bonuses:
    # Rank promotion factors: effective_rank *= (1 - bonus)
    # E.g., 0.5 means the candidate's binding rank is halved (promoted)
    is_frameshift: 0.5        # frameshifts are highly immunogenic
    is_shared_neoantigen: 0.3 # shared neoantigens across patients
    is_cd4_epitope: 0.1       # CD4 help is valuable but less critical

low_tmb:
  # PDAC, GBM, MSS-CRC — fewer neoantigens, relax filters to keep candidates
  hard_filters:
    mhc_binding_rank: 0.05    # relaxed to 5%
    min_tpm: 0.5              # lower expression threshold
    min_ccf: 0.1              # include subclonal
    not_self_match: true
  bonuses:
    is_frameshift: 0.7        # frameshifts even more important with few candidates
    is_shared_neoantigen: 0.5
    is_cd4_epitope: 0.2

research:
  # No filters — show all candidates with full scores
  hard_filters:
    mhc_binding_rank: 1.0
    min_tpm: 0.0
    min_ccf: 0.0
    not_self_match: false
  bonuses:
    is_frameshift: 0.0
    is_shared_neoantigen: 0.0
    is_cd4_epitope: 0.0
